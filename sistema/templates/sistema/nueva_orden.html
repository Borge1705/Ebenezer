<form method="POST">

{% csrf_token %}


<div class="form-group">

<label>Cliente</label>

<select name="cliente">

{% for c in clientes %}

<option value="{{ c.id }}">

{{ c.nombre }}

</option>

{% endfor %}

</select>

</div>



<div class="form-group">

<label>Teléfono</label>

<select name="telefono">

{% for t in telefonos %}

<option value="{{ t.id }}">

{{ t.marca }} {{ t.modelo }}

</option>

{% endfor %}

</select>

</div>




<div class="form-group">

<label>Características del equipo</label>

<textarea name="caracteristicas"></textarea>

</div>



<div class="form-group">

<label>Razón de visita</label>

<textarea name="razon_visita"></textarea>

</div>



<div class="form-group">

<label>Observaciones</label>

<textarea name="observaciones"></textarea>

</div>



<div class="form-group">

<label>Diagnóstico del técnico</label>

<textarea name="diagnostico"></textarea>

</div>




<div class="form-group">

<label>Proceso realizado</label>

<textarea name="proceso_realizado"></textarea>

</div>


<button class="btn-save">

Guardar orden

</button>


</form>
